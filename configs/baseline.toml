midi_start_from = 0
gravity_compensation = true
residual_factor_ik = 0.03
residual_factor_no_ik = 1
shift = 0
record_every = 1
camera_id = "piano/back"
demo_ctrl_timestep = 0.05
clip = true
ae_latent_dim = 16
